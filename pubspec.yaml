name: speech_coach
description: AI-powered speech therapy coach
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio recording
  record: ^5.1.2

  # HTTP
  dio: ^5.7.0
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # UI helpers
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  audio_waveforms: ^1.0.5
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
